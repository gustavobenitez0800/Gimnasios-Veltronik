# ==================================================================
# PERFIL LOCAL — el cerebro embebido del instalable (ADR-009, ladrillo 3)
# ==================================================================
# Con --spring.profiles.active=local, el monolito corre DENTRO del instalable:
# arranca su propia PostgreSQL embebida (LocalEmbeddedPostgresConfig) con data
# dir persistente, y no depende de NINGUNA variable de entorno de la nube.

# El backend local solo atiende a ESTA máquina (Fase 1). El acceso por LAN
# (multi-caja) llega en Fase 3 y será una decisión explícita, no un default.
server.address=127.0.0.1
server.port=${VELTRONIK_LOCAL_PORT:47810}

# Datasource: lo provee LocalEmbeddedPostgresConfig (@Primary). Estos valores
# existen para que ningún placeholder ${DB_URL} quede sin resolver si algo los lee.
spring.datasource.url=jdbc:postgresql://127.0.0.1:${veltronik.local.pg-port:47811}/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

# PostgreSQL embebida: puerto fijo (<=0 = puerto libre al azar, usado por tests)
# y data dir persistente (default: %LOCALAPPDATA%\Veltronik\pgdata — ver ADR-009:
# fuera del directorio de instalacion, JAMAS en carpetas sincronizadas tipo OneDrive).
veltronik.local.pg-port=${VELTRONIK_LOCAL_PG_PORT:47811}
veltronik.local.data-dir=${VELTRONIK_LOCAL_DATA_DIR:}

# Dummies de los placeholders SIN default de la nube (misma receta que
# ApplicationBootTest): el JwtDecoder resuelve el JWKS lazy y el SDK de MP solo
# setea el token, asi que nada de esto toca la red al arrancar.
SUPABASE_URL=https://offline.invalid
MP_ACCESS_TOKEN=OFFLINE-local
MP_PUBLIC_KEY=OFFLINE-local
MP_WEBHOOK_SECRET=offline-local

# Apagado prolijo: Electron hace POST /actuator/shutdown al cerrar la app, para
# que la JVM corra sus shutdown hooks y zonky detenga Postgres (un kill duro en
# Windows los saltea y deja postgres.exe huerfano bloqueando el pgdata).
# Seguro porque server.address=127.0.0.1: solo esta maquina puede llamarlo.
management.endpoints.web.exposure.include=health,info,shutdown
management.endpoint.shutdown.enabled=true

# Pool chico: una sola caja, PC modesta (presupuesto de RAM del ADR-009).
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# === Sync engine (ladrillo 4) — identidad del equipo para el push oportunista ===
# Sin estos tres valores el SyncPushJob queda dormido. El cableado automatico
# post-enrolamiento (la app le pasa la credencial al cerebro local) llega en la
# proxima tajada; mientras tanto se pueden setear por env para probar punta a punta.
veltronik.sync.cloud-url=${VELTRONIK_SYNC_CLOUD_URL:}
veltronik.sync.device-id=${VELTRONIK_SYNC_DEVICE_ID:}
veltronik.sync.device-key=${VELTRONIK_SYNC_DEVICE_KEY:}
veltronik.sync.push-interval-ms=${VELTRONIK_SYNC_INTERVAL_MS:30000}
