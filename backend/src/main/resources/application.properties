spring.application.name=v2-backend
server.port=${PORT:8080}

# === Compresión HTTP (gzip) — los listados grandes (socios/pagos) viajan ~5-10x más
# livianos hacia el frontend; el JSON comprime muy bien y el CPU extra es despreciable.
server.compression.enabled=true
server.compression.mime-types=application/json
server.compression.min-response-size=1024

# === Base de Datos (TODAS las credenciales vienen de variables de entorno) ===
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# === Pool de conexiones (HikariCP) — CRÍTICO para la latencia con Supabase ===
# Mantiene conexiones tibias y reutilizadas: evita pagar el TLS+auth de reconectar
# (cientos de ms cruzando regiones) en cada request.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.keepalive-time=120000
# Compatibilidad con el Transaction Pooler de Supabase (puerto 6543): el pooler en
# modo transaccion NO soporta prepared statements del lado del servidor.
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# === JPA / Hibernate ===
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# === Flyway Database Migrations ===
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=1

# === JWT Validation (Usando Supabase JWKS) ===
veltronik.jwt.jwks-uri=${SUPABASE_URL}/auth/v1/.well-known/jwks.json

# === Mercado Pago (DEBEN setearse como variables de entorno) ===
mercadopago.access.token=${MP_ACCESS_TOKEN}
mercadopago.public.key=${MP_PUBLIC_KEY}
mercadopago.webhook.secret=${MP_WEBHOOK_SECRET}
# Válvula de lanzamiento: poner MP_ENFORCE_SIGNATURE=false destraba el webhook si la firma fallara. Volver a true al validar.
mercadopago.webhook.enforce-signature=${MP_ENFORCE_SIGNATURE:true}

# Fundador(es) — quién ve Mission Control y publica el rollout por anillos (ladrillo 7).
# Coma-separado. Debe ser el email con el que el fundador se loguea (Supabase/Google).
veltronik.founder-emails=${FOUNDER_EMAILS:gustavobenitezlink@gmail.com}

# Precio fijo del sistema (ARS)
veltronik.billing.monthly-price=80000
# Días de prueba gratuita de la PRIMERA sucursal (las adicionales pagan de inmediato).
# Configurable sin tocar código: cambiar acá o vía env var TRIAL_DAYS.
veltronik.billing.trial-days=${TRIAL_DAYS:14}

# === Bot de WhatsApp (Fase 3 vertical canchas) ===
# Gemini Flash (Google AI): sin API key, el bot no arranca (cada complejo se prende aparte).
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
# WhatsApp Cloud API (Meta): el verify-token lo elegís vos y lo cargás también en Meta al
# dar de alta el webhook. El token y phone_number_id de CADA complejo viven en court_settings.
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:}
whatsapp.graph-version=${WHATSAPP_GRAPH_VERSION:v21.0}

# === Spring Actuator (Health Check para Railway) ===
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false

spring.flyway.ignore-missing-migrations=true
