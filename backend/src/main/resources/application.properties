spring.application.name=v2-backend
server.port=${PORT:8080}

# === Base de Datos (TODAS las credenciales vienen de variables de entorno) ===
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate ===
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# === Flyway Database Migrations ===
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=1

# === JWT Validation (Usando Supabase JWKS) ===
veltronik.jwt.jwks-uri=${SUPABASE_URL}/auth/v1/.well-known/jwks.json

# === Mercado Pago (DEBEN setearse como variables de entorno) ===
mercadopago.access.token=${MP_ACCESS_TOKEN}
mercadopago.public.key=${MP_PUBLIC_KEY}
mercadopago.webhook.secret=${MP_WEBHOOK_SECRET}
# Válvula de lanzamiento: poner MP_ENFORCE_SIGNATURE=false destraba el webhook si la firma fallara. Volver a true al validar.
mercadopago.webhook.enforce-signature=${MP_ENFORCE_SIGNATURE:true}

# Precio fijo del sistema (ARS)
veltronik.billing.monthly-price=80000

# === Spring Actuator (Health Check para Railway) ===
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false

spring.flyway.ignore-missing-migrations=true
