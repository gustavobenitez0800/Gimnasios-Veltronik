name: Deploy to Vercel

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'electron/**'
      - 'electron-builder.yml'
      - 'dist/**'
      - 'build/**'

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $DEPLOY_URL"

      - name: Verify Deployment
        run: |
          echo "🚀 Production deployment complete!"
          echo "URL: ${{ steps.deploy.outputs.deploy_url }}"
          # Quick health check
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://gimnasio-veltronik.vercel.app)
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Site is live and responding (HTTP $STATUS)"
          else
            echo "⚠️ Site returned HTTP $STATUS - please verify manually"
          fi
