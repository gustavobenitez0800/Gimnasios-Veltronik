name: Release Electron (Windows)

# Publica un Release de GitHub con el instalador de Veltronik cuando se empuja
# un tag de versión (vX.Y.Z). El electron-updater de los clientes consulta estos
# Releases para auto-actualizarse — la RAMA no importa, solo el Release publicado.
#
# Por qué en la nube: el runner windows-latest es limpio (admin, sin Windows Defender
# bloqueando app.asar, symlinks de winCodeSign permitidos). Resuelve de raíz el fallo
# de empaquetado local. Releases futuros = un `git push` del tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # permite dispararlo a mano desde la pestaña Actions

permissions:
  contents: write          # necesario para que electron-builder cree el Release

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17 (cerebro embebido, ADR-009)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build backend embebido (jar + JRE firmada de Microsoft)
        # Produce frontend/resources/backend/ — electron-builder lo empaqueta
        # como extraResources (resources/backend del instalable). La JRE que
        # viaja es la de Microsoft (Authenticode, ADR-011): jlink quedó
        # descartado porque su runtime sin firma es bloqueado por WDAC.
        working-directory: frontend
        run: powershell -ExecutionPolicy Bypass -File build-tools\build-backend.ps1

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        # --frozen-lockfile: el lock se regeneró en Fase 0 (2026-07-01) y quedó
        # sincronizado con package.json → releases 100% reproducibles.
        run: pnpm install --frozen-lockfile

      - name: Build web (vite)
        # Vite inyecta las VITE_* en build-time. Vienen de GitHub Secrets (NUNCA del
        # repo: los .env están gitignoreados). Sin esto, el bundle arranca con
        # "Missing Supabase environment variables" y la app queda en pantalla negra.
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_MP_PUBLIC_KEY: ${{ secrets.VITE_MP_PUBLIC_KEY }}
        run: pnpm run build

      - name: Build & publish Electron (Windows)
        env:
          # Token integrado del runner: permite publicar el Release sin PAT manual.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sin firma de código (coincide con verifyUpdateCodeSignature: false del yml).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win --publish always
