# ===================================================================
# VELTRONIK V2 - CONFIGURACIÓN DE ENTORNO
# ===================================================================
# Perfiles disponibles:
#   - (default)  → Desarrollo local con PostgreSQL
#   - production → Producción (futuro: Supabase)
# ===================================================================

# --- Servidor ---
server.port=8080

# --- Conexión a PostgreSQL Local ---
# Para pasar a Supabase en el futuro, solo cambiaremos esta URL y credenciales
spring.datasource.url=jdbc:postgresql://localhost:5432/Veltronik
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Hibernate / JPA ---
# "update" = Hibernate actualiza las tablas sin borrar datos existentes.
# En producción usaremos "validate" + Flyway para migraciones controladas.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Hibernate detecta automáticamente el dialecto correcto de PostgreSQL.
# NO especificar manualmente para evitar warnings de versión.
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Desactivar open-in-view para evitar queries inesperados durante el renderizado.
spring.jpa.open-in-view=false

# --- JWT (JSON Web Token) ---
# IMPORTANTE: En producción esta clave debe estar en una variable de entorno,
# nunca hardcodeada en el código fuente.
veltronik.jwt.secret=CAMBIAR_POR_UNA_CLAVE_SECRETA_DE_256_BITS_MINIMO
veltronik.jwt.expiration-ms=86400000
