<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Retención de Socios - Veltronik Platform">
    <title>Retención | Veltronik</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/retention.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/VeltronikGym.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
</head>

<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-logo">
            <img src="assets/VeltronikGym.png" alt="Veltronik">
        </div>
        <div class="loading-spinner"></div>
        <p class="loading-text">Cargando...</p>
    </div>

    <div class="app-layout" id="appContent" style="display: none;">
        <!-- Sidebar (rendered by sidebar.js) -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()"><span data-icon="menu"></span></button>
                    <h1 class="page-title"><span data-icon="shield" class="title-icon"></span> Retención de Socios</h1>
                </div>
                <div class="header-right">
                </div>
            </header>

            <div class="page-content">
                <!-- Retention Module Container -->
                <div id="retentionContainer">
                    <!-- Content will be injected by retention-module.js -->
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/offline-storage.js"></script>
    <script src="js/connection-monitor.js"></script>
    <script src="js/sync-manager.js"></script>
    <script src="js/offline-ui.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/permissions.js"></script>

    <!-- Module Script -->
    <script src="js/retention-module.js"></script>

    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', async () => {
            // SIDEBAR: render shared sidebar component
            Sidebar.init();

            // LOBBY GUARD: require org selection first
            if (!requireOrgContext()) return;

            // PERMISSIONS: Retention analytics are admin-only
            if (!Permissions.restrictPage([CONFIG.ROLES.OWNER, CONFIG.ROLES.ADMIN])) return;
            Permissions.applyPageRestrictions();

            try {
                // Check auth
                const session = await getSupabase().auth.getSession();
                if (!session.data.session) {
                    window.location.href = 'index.html';
                    return;
                }

                // Load profile info
                const profile = await getProfile();
                if (profile) {
                    document.getElementById('userName').textContent = profile.full_name || profile.email;
                    document.getElementById('userRole').textContent = (profile.role || 'owner').charAt(0).toUpperCase() + (profile.role || 'owner').slice(1);
                    document.getElementById('userAvatar').textContent = (profile.full_name || profile.email).slice(0, 2).toUpperCase();
                }

                // Initialize Retention Module
                await retentionService.render('retentionContainer');

                // Hide loading screen
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('appContent').style.display = 'flex';

            } catch (error) {
                console.error('Error initializing page:', error);
                document.getElementById('loadingScreen').innerHTML = '<p class="error">Error al cargar la página</p>';
            }
        });
    </script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}</script>
</body>

</html>
