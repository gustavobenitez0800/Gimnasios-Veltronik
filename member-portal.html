<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portal de Socio - Veltronik Platform">
    <title>Mi Portal | Veltronik</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/logo-main.png">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card" style="max-width: 520px;">
                <!-- Header -->
                <div class="auth-logo">
                    <img src="assets/logo-main.png" alt="Veltronik" class="auth-logo-img">
                    <h1 class="auth-logo-text">Mi Portal</h1>
                    <p class="auth-logo-subtitle">Acceso rápido para socios</p>
                </div>

                <!-- Content -->
                <div id="memberPortalContent" style="display: none;">
                    <h2 class="auth-title" id="memberGreeting">Hola</h2>
                    <p class="auth-subtitle" id="memberGymInfo">Cargando información de tu gimnasio...</p>

                    <div class="card" style="margin-top: 1.5rem;">
                        <div class="card-body">
                            <h3 class="card-title">Tu Cuenta</h3>
                            <p class="text-muted" id="memberEmail">-</p>
                            <p class="text-muted" id="memberStatus">Estado: -</p>
                        </div>
                    </div>

                    <div class="card" style="margin-top: 1rem;">
                        <div class="card-body">
                            <h3 class="card-title">Acceso</h3>
                            <p class="text-muted" id="memberAccessInfo">
                                Tu acceso al gimnasio se gestiona automáticamente por tu suscripción activa.
                            </p>
                        </div>
                    </div>

                    <button class="btn btn-secondary" style="margin-top: 1.5rem; width: 100%;" onclick="handleLogout()">
                        Cerrar sesión
                    </button>
                </div>

                <!-- Loading state -->
                <div id="memberPortalLoading" style="text-align:center; padding:2rem 1rem;">
                    <div class="spinner" style="margin:0 auto 1rem;"></div>
                    <p class="auth-subtitle">Cargando tu información...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const loadingEl = document.getElementById('memberPortalLoading');
            const contentEl = document.getElementById('memberPortalContent');

            try {
                // Reutilizar la misma lógica de sesión que el resto de la plataforma
                const session = await getSession();
                if (!session) {
                    window.location.href = CONFIG.ROUTES.LOGIN;
                    return;
                }

                const profile = await getProfile();
                if (!profile) {
                    window.location.href = CONFIG.ROUTES.LOGIN;
                    return;
                }

                // El lobby marca el rol de la organización actual en localStorage
                const orgRole = localStorage.getItem('current_org_role');
                if (orgRole && orgRole !== CONFIG.ROLES.MEMBER) {
                    // Si el usuario no está entrando como "socio", redirigir al dashboard normal
                    window.location.href = CONFIG.ROUTES.DASHBOARD;
                    return;
                }

                // Intentar cargar datos del gimnasio asociado (si existe)
                let gymName = '';
                try {
                    const gym = await getGym();
                    if (gym && gym.name) {
                        gymName = gym.name;
                    }
                } catch (e) {
                    // No romper el portal si no hay gimnasio
                }

                // Rellenar datos básicos
                const fullName = profile.full_name || 'Socio';
                document.getElementById('memberGreeting').textContent = `Hola, ${fullName}`;
                document.getElementById('memberEmail').textContent = profile.email || '';

                if (gymName) {
                    document.getElementById('memberGymInfo').textContent =
                        `Estás conectado al gimnasio "${gymName}".`;
                } else {
                    document.getElementById('memberGymInfo').textContent =
                        'Tu gimnasio está configurando tu acceso. Si ves algo raro, contactá a recepción.';
                }

                // Estado de cuenta (básico, sin depender de tablas adicionales)
                const statusLabel = profile.status || 'activo';
                document.getElementById('memberStatus').textContent = `Estado: ${statusLabel}`;

                loadingEl.style.display = 'none';
                contentEl.style.display = 'block';

            } catch (error) {
                console.error('Member portal error:', error);
                showToast('Error al cargar tu portal. Intenta de nuevo.', 'error');
                // En caso de error grave, permitir que el usuario vuelva al login
                setTimeout(() => {
                    window.location.href = CONFIG.ROUTES.LOGIN;
                }, 2500);
            }
        });
    </script>
</body>

</html>
