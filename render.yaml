services:
  - type: web
    name: veltronik-api
    runtime: docker
    region: sao-paulo
    plan: starter
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_TOOL_OPTIONS
        value: -XX:MaxRAMPercentage=75.0
      - key: DATABASE_URL
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
