appId: com.veltronik.gimnasio
productName: Veltronik
copyright: Copyright © 2026 Veltronik

# Archivos a incluir en el build
files:
  - "electron/**/*"
  - "dist/**/*"
  - "assets/**/*"
  - "package.json"
  - "!src/**/*"
  - "!public/**/*"
  - "!api/**/*"
  - "!.git/**/*"
  - "!.github/**/*"
  - "!.env"
  - "!.env.*"
  - "!*.md"
  - "!vite.config.js"
  - "!eslint.config.js"
  - "!vercel.json"
  - "!.vercelignore"

# Incluir dependencias de producción automáticamente
asar: true

# Archivos extra a copiar
extraResources:
  - from: "assets/"
    to: "assets/"
  # El cerebro embebido (ADR-009): JRE jlink + fat jar del monolito, producidos
  # por build-tools/build-backend.ps1 ANTES de electron-builder (ver release.yml).
  # backend-runtime.cjs los lanza desde process.resourcesPath/backend/.
  - from: "resources/backend/"
    to: "backend/"

# Directorio de salida (instaladores). Relativo: el build de producción corre en
# GitHub Actions (runner Windows limpio), donde no existe el lock de Defender/OneDrive
# que rompía el empaquetado local. dist_electron está en .gitignore.
directories:
  output: dist_electron
  buildResources: build

# Auto-updates via GitHub Releases
publish:
  provider: github
  owner: gustavobenitez0800
  repo: gimnasios-veltronik
  releaseType: release

# ============================================
# WINDOWS
# ============================================
win:
  icon: assets/LogoPrincipalVeltronik.png
  target:
    - target: nsis
      arch:
        - x64
  # Metadatos profesionales
  legalTrademarks: "TM Veltronik"
  verifyUpdateCodeSignature: false # Permitir updates sin firma (por ahora)
  
  # Configuración de Firma Digital (Code Signing)
  # Se usará automáticamente si las variables de entorno CSC_LINK y CSC_KEY_PASSWORD están definidas
  # No es necesario configurarlo aquí explícitamente.

  artifactName: "Veltronik-Setup-${version}.${ext}"

# Instalador SILENCIOSO estilo Discord/Steam: sin asistente, sin pedir nada.
# El auto-update se aplica solo (el updater llama quitAndInstall en modo silencioso).
nsis:
  oneClick: true              # instala directo, sin wizard Next->Next ni elegir carpeta
  perMachine: false           # por-usuario (AppData), sin UAC/admin
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Veltronik"
  runAfterFinish: true        # abre Veltronik al terminar de instalar/actualizar

# ============================================
# MACOS
# ============================================
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: assets/LogoPrincipalVeltronik.png
  artifactName: "Veltronik-${version}-${arch}.${ext}"
  category: public.app-category.business

dmg:
  title: Veltronik Platform
  icon: assets/LogoPrincipalVeltronik.png

# ============================================
# LINUX
# ============================================
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: assets/LogoPrincipalVeltronik.png
  artifactName: "Veltronik-${version}.${ext}"
  category: Office
  maintainer: veltronikcompany@gmail.com
  vendor: Veltronik

appImage:
  artifactName: "Veltronik-${version}.AppImage"

deb:
  depends:
    - gconf2
    - gconf-service
    - libnotify4
    - libappindicator1
    - libxtst6
    - libnss3
